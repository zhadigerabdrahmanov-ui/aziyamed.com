<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AziyaMed — Орынды бөлісу</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background:#f0f7f3; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; }
  .card { background:#fff; border-radius:24px; padding:36px 28px; max-width:400px; width:100%; box-shadow:0 10px 40px rgba(0,0,0,.1); text-align:center; }
  .logo { font-size:2.5rem; margin-bottom:8px; }
  h1 { font-size:1.4rem; font-weight:800; color:#1a3a2a; margin-bottom:6px; }
  .sub { font-size:.85rem; color:#6b8c76; margin-bottom:28px; }
  .patient-info { background:#f0f7f3; border-radius:14px; padding:14px 18px; margin-bottom:24px; text-align:left; }
  .patient-info .label { font-size:.75rem; color:#6b8c76; font-weight:600; margin-bottom:2px; }
  .patient-info .value { font-size:1rem; font-weight:700; color:#1a3a2a; }
  .btn { width:100%; padding:16px; border:none; border-radius:16px; font-size:1rem; font-weight:700; cursor:pointer; transition:.2s; }
  .btn-share { background:linear-gradient(135deg,#34a455,#1a8043); color:#fff; margin-bottom:10px; }
  .btn-share:hover { opacity:.9; transform:translateY(-1px); }
  .btn-share:disabled { opacity:.5; cursor:not-allowed; transform:none; }
  .status { padding:14px; border-radius:12px; font-size:.88rem; font-weight:600; margin-top:16px; display:none; }
  .status.success { background:#e8f8ef; color:#1a8043; display:block; }
  .status.error { background:#fde8e8; color:#c0392b; display:block; }
  .status.loading { background:#e8f0fe; color:#1a73e8; display:block; }
  .privacy { font-size:.75rem; color:#9ab5a4; margin-top:16px; line-height:1.5; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">📍</div>
  <h1>Орынды бөлісу</h1>
  <p class="sub">AziyaMed медициналық орталығы</p>

  <div class="patient-info">
    <div class="label">Пациент</div>
    <div class="value" id="patientName">—</div>
    <div class="label" style="margin-top:8px;">ЖСН (ИИН)</div>
    <div class="value" id="patientIin">—</div>
  </div>

  <button class="btn btn-share" id="shareBtn" onclick="shareLocation()">
    📍 Орынымды бөлісу
  </button>

  <div id="status" class="status"></div>

  <p class="privacy">Орыныңыз тек AziyaMed қызметкерлеріне ғана көрінеді. Деректер 24 сағаттан кейін автоматты жойылады.</p>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDe4xyQNxgYTYUGGhI5yCFCPIqQFRiEUNY",
    authDomain: "aziyamed-b0714.firebaseapp.com",
    databaseURL: "https://aziyamed-b0714-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "aziyamed-b0714",
    storageBucket: "aziyamed-b0714.firebasestorage.app",
    messagingSenderId: "1049360224531",
    appId: "1:1049360224531:web:a17a04fc172c6bdded4ae6"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  // Get params from URL
  const params = new URLSearchParams(location.search);
  const iin  = params.get('iin')  || 'unknown';
  const name = params.get('name') || 'Пациент';

  document.getElementById('patientName').textContent = decodeURIComponent(name);
  document.getElementById('patientIin').textContent = iin;

  window.shareLocation = function() {
    const btn = document.getElementById('shareBtn');
    const status = document.getElementById('status');
    btn.disabled = true;
    status.className = 'status loading';
    status.textContent = '⏳ Орын анықталуда...';

    if (!navigator.geolocation) {
      status.className = 'status error';
      status.textContent = '❌ Браузер геолокацияны қолдамайды';
      btn.disabled = false;
      return;
    }

    navigator.geolocation.getCurrentPosition(
      function(pos) {
        const data = {
          name: decodeURIComponent(name),
          iin: iin,
          lat: pos.coords.latitude,
          lon: pos.coords.longitude,
          accuracy: Math.round(pos.coords.accuracy),
          timestamp: Date.now(),
          active: true
        };
        set(ref(db, 'locations/' + iin), data)
          .then(function() {
            status.className = 'status success';
            status.textContent = '✅ Орыныңыз бөлісілді! Дәрігер сізді таба алады.';
            btn.textContent = '✅ Бөлісілді';
          })
          .catch(function(e) {
            status.className = 'status error';
            status.textContent = '❌ Қате: ' + e.message;
            btn.disabled = false;
          });
      },
      function(err) {
        status.className = 'status error';
        status.textContent = '❌ Орын рұқсаты берілмеді. Браузер баптауларынан геолокацияға рұқсат беріңіз.';
        btn.disabled = false;
      },
      { enableHighAccuracy: true, timeout: 15000 }
    );
  };
</script>
</body>
</html>
